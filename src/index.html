<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>密室逃脫 — 文字冒險</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
   
  <header id="header">
    <div id="game-title">◈ 密室逃脫：幽靈計畫 ◈</div>
    <div id="timer-display">⏱ 剩餘時間：<span id="timer">60:00</span></div>
  </header>

  <!-- ===== MAIN LAYOUT ===== -->
  <div id="main-layout">

    <!-- Story / Output Area -->
    <div id="story-panel">
      <div id="story-area"></div>
    </div>

    <!-- Right Sidebar -->
    <aside id="sidebar">
      <div id="room-panel">
        <div class="panel-title">📍 當前位置</div>
        <div id="room-name">載入中…</div>
      </div>

      <div id="inventory-panel">
        <div class="panel-title">🎒 物品欄</div>
        <div id="inventory-list">（空）</div>
      </div>

      <div id="exits-panel">
        <div class="panel-title">🚪 出口</div>
        <div id="exits-list">—</div>
      </div>

      <div id="help-panel">
        <div class="panel-title">💡 指令速查</div>
        <div class="help-text">
          look / 環顧四周<br>
          examine [物品]<br>
          take [物品]<br>
          open [物品] [密碼]<br>
          use [物品] [目標]<br>
          combine [物1] [物2]<br>
          read [物品]<br>
          go [方向]<br>
          talk [角色]<br>
          inventory / i<br>
          hint / 提示<br>
          save / load<br>
          help / 說明
        </div>
      </div>
    </aside>

  </div>

  <!-- ===== ACTION BUTTON PANEL ===== -->
  <div id="action-panel">

    <!-- Compass cluster -->
    <div id="compass">
      <div class="compass-row top-row">
        <button class="act-btn dir-btn" id="btn-n" onclick="clickCmd('go north')">▲ 北</button>
      </div>
      <div class="compass-row mid-row">
        <button class="act-btn dir-btn" id="btn-w" onclick="clickCmd('go west')">◀ 西</button>
        <button class="act-btn dir-btn look-btn" onclick="clickCmd('look')">看</button>
        <button class="act-btn dir-btn" id="btn-e" onclick="clickCmd('go east')">東 ▶</button>
      </div>
      <div class="compass-row bot-row">
        <button class="act-btn dir-btn" id="btn-s" onclick="clickCmd('go south')">▼ 南</button>
      </div>
      <div class="compass-row ud-row">
        <button class="act-btn dir-btn" id="btn-u" onclick="clickCmd('go up')">↑ 上</button>
        <button class="act-btn dir-btn" id="btn-d" onclick="clickCmd('go down')">↓ 下</button>
      </div>
    </div>

    <!-- Fixed quick actions -->
    <div id="quick-actions">
      <button class="act-btn quick-btn" onclick="clickCmd('inventory')">🎒 物品欄</button>
      <button class="act-btn quick-btn" onclick="clickCmd('hint')">💡 提示</button>
      <button class="act-btn quick-btn" onclick="clickCmd('map')">🗺 地圖</button>
      <button class="act-btn quick-btn" onclick="clickCmd('save')">💾 儲存</button>
      <button class="act-btn quick-btn" onclick="clickCmd('load')">📂 讀取</button>
      <button class="act-btn quick-btn" onclick="clickCmd('help')">❓ 說明</button>
    </div>

    <!-- Dynamic room / inventory buttons -->
    <div id="room-actions"></div>

  </div>

  <!-- ===== INPUT AREA ===== -->
  <div id="input-area">
    <span id="prompt">&gt;&gt;</span>
    <input id="command-input" type="text" autocomplete="off"
           placeholder="輸入指令，或點擊上方按鈕行動…" autofocus />
  </div>

  <!-- ===== ENDING OVERLAY ===== -->
  <div id="ending-overlay">
    <div id="ending-box">
      <div id="ending-title"></div>
      <div id="ending-text"></div>
      <button id="ending-restart">🔄 重新開始</button>
    </div>
  </div>

  <!-- ===== GAME SCRIPT ===== -->
  <script src="game.js"></script>

</body>
</html>
