<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>密室逃脫 — 文字冒險</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
   
  <header id="header">
    <div id="game-title">◈ 密室逃脫：幽靈計畫 ◈</div>
    <div id="timer-display">⏱ 剩餘時間：<span id="timer">30:00</span></div>
  </header>

  <!-- ===== MAIN LAYOUT ===== -->
  <div id="main-layout">

    <!-- Story / Output Area -->
    <div id="story-panel">
      <div id="story-area"></div>
    </div>

    <!-- Right Sidebar -->
    <aside id="sidebar">
      <div id="room-panel">
        <div class="panel-title">📍 當前位置</div>
        <div id="room-name">載入中…</div>
      </div>

      <div id="inventory-panel">
        <div class="panel-title">🎒 物品欄</div>
        <div id="inventory-list">（空）</div>
      </div>

      <div id="exits-panel">
        <div class="panel-title">🚪 出口</div>
        <div id="exits-list">—</div>
      </div>

      <div id="help-panel">
        <div class="panel-title">💡 指令速查</div>
        <div class="help-text">
          look / 環顧四周<br>
          examine [物品]<br>
          take [物品]<br>
          open [物品] [密碼]<br>
          use [物品] [目標]<br>
          combine [物1] [物2]<br>
          read [物品]<br>
          go [方向]<br>
          talk [角色]<br>
          inventory / i<br>
          hint / 提示<br>
          save / load<br>
          help / 說明
        </div>
      </div>
    </aside>

  </div>

  <!-- ===== INPUT AREA ===== -->
  <div id="input-area">
    <span id="prompt">&gt;&gt;</span>
    <input id="command-input" type="text" autocomplete="off"
           placeholder="輸入指令… (help 查看說明)" autofocus />
  </div>

  <!-- ===== GAME SCRIPT ===== -->
  <script src="game.js"></script>

</body>
</html>
