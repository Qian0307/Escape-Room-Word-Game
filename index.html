<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>密室逃脫 — 幽靈計畫</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header id="header">
    <div id="game-title">◈ 密室逃脫：幽靈計畫 ◈</div>
    <div id="timer-display">⏱ 剩餘時間：<span id="timer">60:00</span></div>
  </header>

  <!-- ===== MAIN LAYOUT ===== -->
  <div id="main-layout">

    <!-- Story / Output Area -->
    <div id="story-panel">
      <div id="story-area"></div>
    </div>

    <!-- Right Sidebar -->
    <aside id="sidebar">
      <div id="room-panel">
        <div class="panel-title">📍 當前位置</div>
        <div id="room-name">載入中…</div>
      </div>

      <!-- Inventory as draggable cards -->
      <div id="inventory-panel">
        <div class="panel-title">🎒 物品欄 <small>（拖移物品可合成／互動）</small></div>
        <div id="inventory-cards"></div>
      </div>

      <div id="exits-panel">
        <div class="panel-title">🚪 可前往</div>
        <div id="exits-list">—</div>
      </div>

      <div id="progress-panel">
        <div class="panel-title">📊 解謎進度</div>
        <div id="progress-info">0 個謎題已解</div>
      </div>
    </aside>

  </div>

  <!-- ===== ACTION PANEL ===== -->
  <div id="action-panel">

    <!-- Dynamic destination buttons -->
    <div id="destinations"></div>

    <!-- Fixed quick actions -->
    <div id="quick-actions">
      <button class="act-btn quick-btn" onclick="clickCmd('look')">🔍 環顧</button>
      <button class="act-btn quick-btn hint-btn" onclick="clickCmd('hint')">💡 提示</button>
      <button class="act-btn quick-btn" onclick="clickCmd('map')">🗺 地圖</button>
      <button class="act-btn quick-btn" onclick="clickCmd('save')">💾 儲存</button>
      <button class="act-btn quick-btn" onclick="clickCmd('load')">📂 讀取</button>
      <button class="act-btn quick-btn" onclick="showTutorial()" style="font-size:11px;opacity:0.7;">📖 教學</button>
    </div>

    <!-- Room items (take) + Room interactive objects (drag targets) -->
    <div id="room-actions"></div>

  </div>

  <!-- ===== CODE INPUT MODAL ===== -->
  <div id="code-modal">
    <div id="code-box">
      <div id="code-modal-title">輸入密碼</div>
      <div id="code-desc"></div>
      <input id="code-input" type="text" inputmode="numeric" pattern="[0-9]*"
             placeholder="輸入數字密碼…" autocomplete="off" />
      <div id="code-btns">
        <button id="code-cancel" onclick="closeCodeModal()">✕ 取消</button>
        <button id="code-confirm" onclick="confirmCode()">✔ 確認</button>
      </div>
    </div>
  </div>

  <!-- ===== TUTORIAL OVERLAY ===== -->
  <div id="tutorial-overlay">
    <div id="tutorial-box">
      <div id="tutorial-indicator"></div>
      <div id="tutorial-step-dots"></div>
      <div id="tutorial-icon"></div>
      <div id="tutorial-title"></div>
      <div id="tutorial-content"></div>
      <div id="tutorial-demo"></div>
      <div id="tutorial-nav">
        <button id="tutorial-skip" onclick="skipTutorial()">跳過教學</button>
        <button id="tutorial-next" onclick="nextTutorialStep()">下一步 →</button>
      </div>
    </div>
  </div>

  <!-- ===== MAP MODAL ===== -->
  <div id="map-modal">
    <div id="map-box">
      <div id="map-title">🗺 設施地圖</div>
      <div id="map-legend">
        <span class="ml current">▶ 當前位置</span>
        <span class="ml visited">✓ 已探索</span>
        <span class="ml locked">🔒 上鎖</span>
        <span class="ml unvisited">○ 未探索</span>
      </div>
      <div id="map-grid"></div>
      <button id="map-close" onclick="closeMapModal()">✕ 關閉地圖</button>
    </div>
  </div>

  <!-- ===== ENDING OVERLAY ===== -->
  <div id="ending-overlay">
    <div id="ending-box">
      <div id="ending-title"></div>
      <div id="ending-text"></div>
      <div id="ending-walkthrough"></div>
      <button id="ending-restart">🔄 重新開始</button>
    </div>
  </div>

  <!-- ===== GAME SCRIPT ===== -->
  <script src="game.js"></script>

</body>
</html>
